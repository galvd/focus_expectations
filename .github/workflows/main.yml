name: Update Focus Charts

on:
  schedule:
    - cron: '0 12 * * 6' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pandas matplotlib python-bcb

      - name: Criar config.json temporário
        run: |
          # Define o caminho para a raiz do repositório no ambiente do runner
          echo "{
            \"caminho_rede\": \"$GITHUB_WORKSPACE\"
          }" > settings/config.json

      - name: Executar script de coleta e geração de gráficos
        run: python main.py

      - name: Remover config.json
        if: always() # Garante que o arquivo seja deletado mesmo se o script falhar
        run: rm settings/config.json

      - name: Commit e Push das atualizações
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add charts/*.png
          git commit -m "Autodeploy: Atualização semanal das expectativas Focus $(date +'%Y-%m-%d')" || exit 0
          git push
