name: Update Focus Charts

on:
  schedule:
    - cron: '0 12 * * 5' 
  workflow_dispatch: # Permite que você execute manualmente clicando em um botão no GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pandas matplotlib python-bcb

      - name: Executar script de coleta e geração de gráficos
        run: python main.py

      - name: Commit e Push das atualizações
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add charts/*.png
          # O comando abaixo evita erro caso não haja mudanças nos arquivos
          git commit -m "Autodeploy: Atualização semanal das expectativas Focus $(date +'%Y-%m-%d')" || exit 0
          git push
