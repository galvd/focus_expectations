name: Update Focus Charts

on:
  schedule:
    - cron: '0 12 * * 6' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pandas matplotlib python-bcb

      - name: Preparar ambiente (Pastas e Config)
        run: |
          # Cria a pasta data na raiz do repositório
          mkdir -p data
          # Cria o config.json apontando para o workspace do runner
          echo "{
            \"caminho_rede\": \"$GITHUB_WORKSPACE\"
          }" > settings/config.json

      - name: Executar script de coleta e geração de gráficos
        run: python main.py

      - name: Limpar arquivos temporários e cache
        if: always()
        run: |
          # Remove o config.json para não ser commitado
          rm -f settings/config.json
          # Remove a pasta data e todo o seu conteúdo (CSVs baixados)
          rm -rf data

      - name: Commit e Push das atualizações
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Adiciona apenas os novos gráficos gerados
          git add charts/*.png
          
          # Commit apenas se houver mudanças nos gráficos
          git commit -m "Autodeploy: Atualização semanal das expectativas Focus $(date +'%Y-%m-%d')" || exit 0
          git push
